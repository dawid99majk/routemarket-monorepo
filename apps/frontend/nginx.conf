server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-cache hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Avoid stale app shells after cutovers or deploys.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires -1;
  }

  # Route Builder v2 API proxy. Keeps browser traffic on the same HTTPS origin.
  # Using variable for upstream and internal Docker resolver to prevent IP caching issues.
  location /route-builder-api/ {
    resolver 127.0.0.11 valid=30s;
    set $backend "http://route-builder-api:8081";
    rewrite ^/route-builder-api/(.*)$ /$1 break;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
