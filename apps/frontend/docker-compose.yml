# ============================================================================
# RouteMarket — production stack on a single VPS
# Includes: frontend (nginx) + Caddy reverse proxy with auto-HTTPS.
# Supabase (db, auth, storage, edge runtime) is deployed via the official
# self-hosted compose file in ./supabase-self-hosted/ — see DEPLOY_VPS.md.
# ============================================================================
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    image: routemarket-frontend:latest
    restart: unless-stopped
    ports:
      - "8089:8080"
    expose:
      - "8080"
    networks:
      web:
      routemarket-network:
        aliases:
          - routemarket-frontend

  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-routemarket.io}
      SUPABASE_UPSTREAM: ${SUPABASE_UPSTREAM:-host.docker.internal:8000}
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]
    depends_on: [frontend]

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
  routemarket-network:
    external: true
