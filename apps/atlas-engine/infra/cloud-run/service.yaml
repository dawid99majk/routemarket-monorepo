apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: atlas-engine
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/atlas-engine:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
